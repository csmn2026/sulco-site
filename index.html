<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1C1814">
<title>SULCO — Som & Discos</title>
<meta name="description" content="Loja de discos e sala de escuta. Em breve na Savassi, Belo Horizonte.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bone:#EFE7D6; --ink:#1C1814; --vermelho:#C8412A; --ocre:#C98A2B; --musgo:#2B4F45;
    --ink-80:rgba(28,24,20,.80); --ink-55:rgba(28,24,20,.55); --ink-40:rgba(28,24,20,.40); --ink-12:rgba(28,24,20,.12);
    --bone-70:rgba(239,231,214,.70); --bone-45:rgba(239,231,214,.45);
    --display:"Anton",Impact,sans-serif; --label:"Space Grotesk",monospace; --body:"Archivo",Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bone); color:var(--ink); font-family:var(--body); display:flex; flex-direction:column; min-height:100%}

  /* campo escuro — a etiqueta */
  .top{
    position:relative; background:var(--ink); color:var(--bone); overflow:hidden;
    flex:0 0 auto; min-height:46vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:48px 28px calc(40px + env(safe-area-inset-top)); padding-top:calc(48px + env(safe-area-inset-top));
  }
  .arcs{position:absolute; width:150%; max-width:640px; aspect-ratio:1; left:50%; top:50%; transform:translate(-50%,-50%); opacity:.14; pointer-events:none}
  .word{position:relative; font-family:var(--display); font-size:clamp(64px,20vw,132px); line-height:.84; letter-spacing:.02em; color:var(--bone)}
  .kick{position:relative; font-family:var(--label); font-size:clamp(12px,3.2vw,15px); font-weight:600; letter-spacing:.36em; color:var(--ocre); text-transform:uppercase; margin-top:14px}

  /* campo claro — a recepção */
  .bot{flex:1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:44px 30px calc(36px + env(safe-area-inset-bottom))}
  .inner{max-width:460px}
  .rule{width:48px; height:3px; background:var(--vermelho); margin:0 auto 26px}
  .tagline{font-family:var(--body); font-weight:700; font-size:clamp(20px,5.5vw,26px); line-height:1.2; color:var(--ink)}
  .desc{font-family:var(--body); font-weight:400; font-size:15px; line-height:1.6; color:var(--ink-80); margin-top:16px}
  .soon{display:inline-flex; align-items:center; gap:9px; margin-top:30px; font-family:var(--label); font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--musgo)}
  .soon .pulse{width:8px; height:8px; border-radius:50%; background:var(--musgo)}
  .place{font-family:var(--label); font-size:12.5px; letter-spacing:.06em; color:var(--ink-55); margin-top:14px; text-transform:uppercase}
  footer{font-family:var(--body); font-size:12px; color:var(--ink-40); padding:0 30px calc(24px + env(safe-area-inset-bottom)); text-align:center}
  @media (prefers-reduced-motion:no-preference){ .pulse{animation:p 2s ease-in-out infinite} @keyframes p{0%,100%{opacity:1}50%{opacity:.25}} }
</style>
</head>
<body>
  <div class="top">
    <svg class="arcs" viewBox="0 0 100 100" aria-hidden="true"><g fill="none" stroke="#EFE7D6" stroke-width="0.6"><circle cx="50" cy="50" r="11"/><circle cx="50" cy="50" r="18"/><circle cx="50" cy="50" r="25"/><circle cx="50" cy="50" r="32"/><circle cx="50" cy="50" r="39"/><circle cx="50" cy="50" r="46"/></g></svg>
    <div class="word">SULCO</div>
    <div class="kick">Som&nbsp;&amp;&nbsp;Discos</div>
  </div>
  <div class="bot">
    <div class="inner">
      <div class="rule"></div>
      <div class="tagline">Loja de discos e sala de escuta.</div>
      <div class="desc">Garimpo, reedições e lançamentos — pra ouvir com calma e levar pra casa.</div>
      <div class="soon"><span class="pulse"></span>Em breve</div>
      <div class="place">Galeria São Vicente · Savassi — Belo Horizonte</div>
    </div>
  </div>
  <footer>© SULCO · Som &amp; Discos</footer>
</body>
</html>
